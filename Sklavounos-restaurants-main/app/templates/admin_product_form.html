{% extends "base.html" %}
{% block content %}
{% include "admin_nav.html" %}

<div class="max-w-2xl">
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-semibold">{{ "Edit Product" if product else "New Product" }}</h1>
    <a class="text-slate-300 hover:text-slate-100" href="/admin/products">Back</a>
  </div>

  {% if error %}
    <div class="mb-4 rounded-2xl border border-rose-800 bg-rose-950/30 px-4 py-3 text-rose-200">{{ error }}</div>
  {% endif %}

  <form method="post" class="rounded-2xl border border-slate-800 bg-slate-900/40 p-5 space-y-4">
    <div>
      <label class="block text-sm text-slate-300 mb-1">SKU</label>
      <input name="sku" value="{{ product.sku if product else '' }}" class="w-full px-3 py-2 rounded-xl bg-slate-950 border border-slate-800" placeholder="e.g. CHICK-BREAST" required>
    </div>

    <div>
      <label class="block text-sm text-slate-300 mb-1">Name</label>
      <input name="name" value="{{ product.name if product else '' }}" class="w-full px-3 py-2 rounded-xl bg-slate-950 border border-slate-800" placeholder="Product name" required>
    </div>

    <div>
      <label class="block text-sm text-slate-300 mb-1">Category</label>
      <input name="category" value="{{ product.category if product else 'General' }}" class="w-full px-3 py-2 rounded-xl bg-slate-950 border border-slate-800" placeholder="e.g. Chicken">
    </div>

    <div>
      <label class="block text-sm text-slate-300 mb-1">Unit</label>
      <select name="unit_id" class="w-full px-3 py-2 rounded-xl bg-slate-950 border border-slate-800">
        {% for u in units %}
          <option value="{{ u.id }}" {% if product and product.unit_id == u.id %}selected{% endif %}>{{ u.label_el }} ({{ u.code }})</option>
        {% endfor %}
      </select>
    </div>

    <div class="flex items-center gap-2">
      <input id="is_active" type="checkbox" name="is_active" value="1" class="h-4 w-4"
        {% if product is none or product.is_active %}checked{% endif %}>
      <label for="is_active" class="text-sm text-slate-300">Active</label>
    </div>

    <div class="flex justify-end gap-2 pt-2">
      <a class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700" href="/admin/products">Cancel</a>
      <button class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-500">Save</button>
    </div>
  </form>
</div>
{% endblock %}
