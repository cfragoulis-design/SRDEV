{% extends "base.html" %}
{% block content %}
<h2>Announcements</h2>
<a href="/admin/announcements/new">+ New Announcement</a>
<table>
    <tr><th>ID</th><th>Title</th><th>Type</th><th>Active</th><th>Actions</th></tr>
    {% for a in announcements %}
    <tr>
        <td>{{ a.id }}</td>
        <td>{{ a.title }}</td>
        <td>{{ a.type }}</td>
        <td>{{ "Yes" if a.is_active else "No" }}</td>
        <td>
            <a href="/admin/announcements/edit/{{ a.id }}">Edit</a>
            <a href="/admin/announcements/delete/{{ a.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
