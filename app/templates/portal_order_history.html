<!-- === PATCH: Portal Order History Template === -->

{% extends "portal_base.html" %}

{% block content %}
<h2>Οι Παραγγελίες μου</h2>

<table style="width:100%; border-collapse: collapse;">
    <thead>
        <tr>
            <th style="text-align:left;">Ημερομηνία</th>
            <th style="text-align:left;">ID</th>
            <th style="text-align:left;">Κατάσταση</th>
            <th style="text-align:left;">Γραμμές</th>
        </tr>
    </thead>
    <tbody>
        {% for order in orders %}
        <tr>
            <td>{{ order.created_at.strftime("%d/%m/%Y %H:%M") }}</td>
            <td>#{{ order.id }}</td>
            <td>{{ order.status }}</td>
            <td>{{ order.lines|length }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
