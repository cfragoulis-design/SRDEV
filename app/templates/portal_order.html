
<!-- PATCH: contact fields -->
<input type="text" id="phone" placeholder="Τηλέφωνο">
<input type="email" id="email" placeholder="Email">

<script>
let timeout;

function autosave() {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        fetch(window.location.pathname + "/save-contact", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                phone: document.getElementById("phone").value,
                email: document.getElementById("email").value
            })
        });
    }, 800);
}

document.getElementById("phone").addEventListener("input", autosave);
document.getElementById("email").addEventListener("input", autosave);
</script>
