{% extends "base.html" %}
{% block content %}

<div class="max-w-5xl mx-auto px-4 py-6">

  <!-- DATE FIELD (NO DEFAULT VALUE) -->
  <div class="mb-4">
    <label class="block text-sm font-medium mb-1">Ημερομηνία Παράδοσης</label>
    <input type="date" name="delivery_date"
           class="border rounded-lg px-3 py-2 w-full">
  </div>

</div>

<!-- MODAL -->
<div id="deliveryModal"
     class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md text-center">
    <h2 class="text-xl font-semibold mb-2">
      Επιλέξτε ημερομηνία παράδοσης
    </h2>
    <p class="text-gray-600 mb-4">
      Για να συνεχίσετε με την παραγγελία σας, επιλέξτε πρώτα ημερομηνία.
    </p>

    <input type="date" id="modalDate"
           class="border rounded-lg px-3 py-2 w-full text-center mb-4">

    <button id="confirmDate"
            class="bg-black text-white px-4 py-2 rounded-lg w-full">
      Συνέχεια
    </button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  if (window.deliveryModalInitialized) return;
  window.deliveryModalInitialized = true;

  const dateInput = document.querySelector('input[name="delivery_date"]');
  const modal = document.getElementById("deliveryModal");
  const modalDate = document.getElementById("modalDate");
  const confirmBtn = document.getElementById("confirmDate");

  if (!dateInput || !modal || !modalDate || !confirmBtn) return;

  // FORCE ALWAYS if empty
  if (!dateInput.value) {
    modal.classList.remove("hidden");

    setTimeout(() => {
      modalDate.focus();
      if (modalDate.showPicker) modalDate.showPicker();
    }, 200);
  }

  confirmBtn.addEventListener("click", function () {
    if (!modalDate.value) {
      alert("Παρακαλώ επιλέξτε ημερομηνία.");
      return;
    }

    dateInput.value = modalDate.value;
    modal.classList.add("hidden");
  });

});
</script>

{% endblock %}
